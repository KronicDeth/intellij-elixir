name: Test

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''
      elixir-version:
        description: 'Elixir version to use'
        required: false
        type: string
        default: '1.13.4'
      otp-version:
        description: 'OTP version to use'
        required: false
        type: string
        default: '24.3.4.6'
      upload-reports:
        description: 'Upload test reports as artifacts'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, windows-2025 ]
        idea-version:
            - '2026.1.2'
            - '2025.3.5'
            # 2026.2 upgrades to Java 25, won't work in CI until we resolve issues. https://github.com/JetBrains/intellij-community/commit/aa1cfa9632ab
            # - 'LATEST-EAP-SNAPSHOT'

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Build Environment
        id: setup-env
        uses: ./.github/actions/setup-env
        with:
          elixir-version: ${{ inputs.elixir-version || '1.13.4' }}
          otp-version: ${{ inputs.otp-version || '24.3.4.6' }}
          idea-version: ${{ matrix.idea-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-scan-publish: 'true'

      - name: Run Tests
        id: test
        run: ./gradlew --stacktrace check

      - name: Publish Test Results
        id: publish-test-results-linux
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && runner.os == 'Linux'
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: Test Results (${{ matrix.os }}, ${{ matrix.idea-version }})
          report_suite_logs: "error"

      - name: Publish Test Results
        id: publish-test-results-windows
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always() && runner.os == 'Windows'
        with:
          files: '**/build/test-results/**/*.xml'
          check_name: Test Results (${{ matrix.os }}, ${{ matrix.idea-version }})
          report_suite_logs: "error"

      - name: Upload Test Reports (on failure or when requested)
        id: upload-test-reports
        uses: actions/upload-artifact@v6
        if: ${{ always() && (failure() || inputs.upload-reports) }}
        with:
          name: test-reports-${{ matrix.os }}-${{ matrix.idea-version }}
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/build/reports/problems/**
          retention-days: 30
          include-hidden-files: true
          overwrite: true
          if-no-files-found: 'warn'

  build-plugin:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Build Environment
        id: setup-env
        uses: ./.github/actions/setup-env
        with:
          setup-elixir: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          idea-version: '2026.1.2'
          free-docker-images: false

      - name: Build Plugin
        id: build-plugin
        run: ./gradlew buildPlugin

      - name: Upload Plugin Zip
        id: upload-plugin-zip
        uses: actions/upload-artifact@v6
        with:
          name: plugin-zip
          path: build/distributions/*.zip
          retention-days: 1
          if-no-files-found: 'error'

  # Verify one IDE at a time to avoid OOM -- the verifier runs all IDEs concurrently
  # and there is no CLI flag to control parallelism.
  verify-plugin:
    needs: build-plugin
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ide-version:
          - 'ideaIU:253.33514.17'
          - 'ideaIU:261.24374.151'
          - 'rubymine:2025.3.5'
          - 'rubymine:2026.1.2'

    steps:
      - name: Sanitise IDE version for artifact names
        id: sanitise
        run: echo "ide-version=${IDE_VERSION//:/-}" >> "$GITHUB_OUTPUT"
        env:
          IDE_VERSION: ${{ matrix.ide-version }}

      - name: Download Plugin Zip
        id: download-plugin-zip
        uses: actions/download-artifact@v6
        with:
          name: plugin-zip
          path: build/distributions

      # Fork to be replaced when/if https://github.com/ChrisCarini/intellij-platform-plugin-verifier-action/pull/102 merges
      - name: Verify Plugin
        id: verify-plugin
        uses: sh41/intellij-platform-plugin-verifier-action@add_format_options
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Pin to 1.384 (2025-03-19): versions >=1.385 introduced https://youtrack.jetbrains.com/issue/MP-7267 which
          # causes the pipeline to fail on a regular basis.
          verifier-version: '1.384'
          ide-versions: |
            ${{ matrix.ide-version }}
          failure-levels: |
            COMPATIBILITY_PROBLEMS
            INVALID_PLUGIN
          # Should probably have these two as well, but until there is a resolution for https://youtrack.jetbrains.com/issue/IJPL-243914
          # These will keep failing the build
          # OVERRIDE_ONLY_API_USAGES
          # NON_EXTENDABLE_API_USAGES
          # We can't use this because RubyMine will fail. The verifier doesn't understand "optional"
          # MISSING_DEPENDENCIES
          external-prefixes: 'org.jetbrains.jps'
          verification-reports-formats: 'plain,markdown,html'
          add-to-summary: 'verification-verdict.txt,compatibility-problems.txt,invalid-plugin.txt'

      - name: Print Verification Output
        id: print-verification-output
        if: always()
        run: |
          log_file="${{ steps.verify-plugin.outputs.verification-output-log-filename }}"
          if [ -n "$log_file" ] && [ -f "$log_file" ]; then
            cat "$log_file"
          fi

      - name: Upload Verify Reports
        id: upload-verify-reports
        uses: actions/upload-artifact@v6
        if: ${{ always() && inputs.upload-reports }}
        with:
          name: verify-plugin-reports-${{ steps.sanitise.outputs.ide-version }}
          path: |
            ${{ steps.verify-plugin.outputs.verification-output-log-filename }}
            ${{ steps.verify-plugin.outputs.verification-reports-dir }}
          retention-days: 30

      - name: Upload Plugin Artifact
        id: upload-plugin
        uses: actions/upload-artifact@v6
        with:
          name: plugin-artifact-${{ steps.sanitise.outputs.ide-version }}
          path: build/distributions/*.zip
          retention-days: 1
