name: Test

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''
      elixir-version:
        description: 'Elixir version to use'
        required: false
        type: string
        default: '1.13.4'
      otp-version:
        description: 'OTP version to use'
        required: false
        type: string
        default: '24.3.4.6'
      upload-reports:
        description: 'Upload test reports as artifacts'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Test results are published by test-results.yml (workflow_run) so they also
# appear for fork and dependabot PRs, where this run's GITHUB_TOKEN is read-only.
permissions:
  contents: read
  # gradle/actions/setup-gradle comments its job summary on failing PR builds
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  # test-results.yml needs the event payload of this run to publish results
  # against the right commit and pull request
  event_file:
    name: Event File
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Upload Event File
        id: upload-event-file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Event File
          path: ${{ github.event_path }}

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-22.04, windows-2025 ]
        idea-version:
            - '2026.2'
            - '2026.1.4'
            - '2025.3.6'
            # - 'LATEST-EAP-SNAPSHOT'
        # 2026.2 (build 262) is compiled for and runs on Java 25; earlier builds use Java 21.
        # The build script derives javac --release from the platform version; the installed
        # JBR must match so it can compile and run the tests. Legs without an entry get the
        # setup-env default of 21.
        include:
            - idea-version: '2026.2'
              java-version: '25'

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Build Environment
        id: setup-env
        uses: ./.github/actions/setup-env
        with:
          elixir-version: ${{ inputs.elixir-version || '1.13.4' }}
          otp-version: ${{ inputs.otp-version || '24.3.4.6' }}
          idea-version: ${{ matrix.idea-version }}
          java-version: ${{ matrix.java-version || '21' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-scan-publish: 'true'
          skip-searchable-options: 'true'

      # Fail fast on compile errors (e.g. APIs removed in a newer platform) before the
      # Elixir/quoter setup and test execution spend their minutes. testClasses aggregates
      # main and test compilation across all modules; check reuses its outputs as UP-TO-DATE.
      - name: Compile
        id: compile
        run: ./gradlew -Dorg.gradle.console=plain --stacktrace testClasses

      - name: Run Tests
        id: test
        run: ./gradlew -Dtestlogger.theme=standard -Dorg.gradle.console=plain --stacktrace check

      - name: Upload Test Results
        id: upload-test-results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: (!cancelled())
        with:
          name: Test Results (${{ matrix.os }}, ${{ matrix.idea-version }})
          path: '**/build/test-results/**/*.xml'
          if-no-files-found: warn

      - name: Summarize first failed tests
        id: summarize-failed-tests
        if: always()
        run: |
          PYTHON_BIN="$(command -v python3 || command -v python || true)"
          [ -n "$PYTHON_BIN" ] || exit 0

          "$PYTHON_BIN" - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          MAX_FAILURES = 10
          seen = set()
          failed = []

          files = glob.glob("**/build/test-results/**/*.xml", recursive=True)
          if not files:
              raise SystemExit(0)

          for path in files:
              try:
                  root = ET.parse(path).getroot()
              except Exception:
                  continue

              for tc in root.iter("testcase"):
                  if tc.find("failure") is None and tc.find("error") is None:
                      continue

                  classname = " ".join(tc.get("classname", "<unknown>").split())
                  testname = " ".join(tc.get("name", "<unknown>").split())
                  item = (classname, testname)
                  if item in seen:
                      continue

                  seen.add(item)
                  failed.append(item)
                  if len(failed) >= MAX_FAILURES:
                      break

              if len(failed) >= MAX_FAILURES:
                  break

          if not failed:
              raise SystemExit(0)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as s:
              s.write("### Failed tests (max 10)\n\n")
              s.writelines(f"- `{cls}.{name}`\n" for cls, name in failed)
          PY

      - name: Upload Test Reports (on failure or when requested)
        id: upload-test-reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && (failure() || inputs.upload-reports) }}
        with:
          name: test-reports-${{ matrix.os }}-${{ matrix.idea-version }}
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/build/reports/problems/**
          retention-days: 30
          include-hidden-files: true
          overwrite: true
          if-no-files-found: 'warn'

  build-plugin:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false

      - name: Setup Build Environment
        id: setup-env
        uses: ./.github/actions/setup-env
        with:
          setup-elixir: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          idea-version: '2026.1.4'
          free-docker-images: false
          skip-searchable-options: 'true'

      - name: Build Plugin
        id: build-plugin
        run: ./gradlew buildPlugin

      # Find these versions at:
      # https://www.jetbrains.com/idea/download/other/
      # https://www.jetbrains.com/ruby/download/other/
      - name: Verify Plugin
        id: verify-plugin
        # Fork to be replaced when/if https://github.com/ChrisCarini/intellij-platform-plugin-verifier-action/pull/102 merges
        uses: sh41/intellij-platform-plugin-verifier-action@add_format_options
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          verifier-version: 1.404
          ide-versions: |
            ideaIU:253.33813.25
            ideaIU:261.26222.65
            ideaIU:262.8665.258
            rubymine:2025.3.6
            rubymine:2026.1.4
          failure-levels: |
            COMPATIBILITY_PROBLEMS
            INVALID_PLUGIN
          # Should probably have these two as well, but until there is a resolution for https://youtrack.jetbrains.com/issue/IJPL-243914
          # These will keep failing the build
          # OVERRIDE_ONLY_API_USAGES
          # NON_EXTENDABLE_API_USAGES
          # We can't use this because RubyMine will fail. The verifier doesn't understand "optional"
          # MISSING_DEPENDENCIES
          external-prefixes: 'org.jetbrains.jps'
          verification-reports-formats: 'plain,markdown,html'
          add-to-summary: 'verification-verdict.txt,compatibility-problems.txt,invalid-plugin.txt'

      - name: Print Verification Output
        id: print-verification-output
        if: always()
        run: |
          log_file="${{ steps.verify-plugin.outputs.verification-output-log-filename }}"
          if [ -n "$log_file" ] && [ -f "$log_file" ]; then
            cat "$log_file"
          fi

      - name: Upload Verify Reports
        id: upload-verify-reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() && inputs.upload-reports }}
        with:
          name: verify-plugin-reports
          path: |
            ${{ steps.verify-plugin.outputs.verification-output-log-filename }}
            ${{ steps.verify-plugin.outputs.verification-reports-dir }}
          retention-days: 30

      - name: Upload Plugin Artifact
        id: upload-plugin
        run: |
          zip_file=$(ls build/distributions/*.zip | head -1)
          artifact_name=$(basename "$zip_file" .zip)
          echo "artifact-name=$artifact_name" >> "$GITHUB_OUTPUT"
          unzip -o "$zip_file" -d build/distributions/unpacked

      - name: Upload Plugin Artifact (contents)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.upload-plugin.outputs.artifact-name }}
          path: build/distributions/unpacked/
          retention-days: 1
